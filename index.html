<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RECIPE ENGINE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #facc15;
            --glass: rgba(15, 15, 20, 0.85);
        }
        body {
            font-family: 'Outfit', sans-serif;
            background: #050507;
            color: #e2e8f0;
            background-image: radial-gradient(circle at 50% -20%, #1e1b4b 0%, transparent 40%);
        }
        h1, h2, h3 { font-family: 'Space Grotesk', sans-serif; }
        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }
        .veg-check:checked + label {
            border-color: var(--accent);
            background: rgba(250, 204, 21, 0.1);
            box-shadow: 0 0 20px rgba(250, 204, 21, 0.15);
            transform: scale(1.02);
        }
        .step-pill {
            background: linear-gradient(90deg, #facc15 0%, #fb923c 100%);
        }
        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up {
            opacity: 0;
            translate: 0 10px;
            animation: fadeInUp 0.8s forwards;
        }
    </style>
</head>
<body class="p-6 md:p-12 overflow-x-hidden">

    <div class="max-w-7xl mx-auto">
        <header class="text-center mb-20">
            <div class="inline-block px-4 py-1 border border-yellow-500/30 rounded-full mb-6 bg-yellow-500/5">
                <span class="text-yellow-500 text-xs font-bold tracking-[0.4em] uppercase">Cook Book ++</span>
            </div>
            <h1 class="text-7xl md:text-9xl font-black tracking-tighter mb-6 text-white italic">
                RECIPE<span class="text-yellow-400"> HUB</span>
            </h1>
            <p class="text-slate-400 max-w-2xl mx-auto text-lg leading-relaxed">
                Unlock professional-grade South Indian culinary secrets. Detailed, step-by-step protocols for the modern kitchen.
            </p>
        </header>

        <section class="glass-panel rounded-[3rem] p-10 md:p-16 mb-24 relative overflow-hidden">
            <div class="absolute top-0 right-0 p-10 opacity-10 pointer-events-none">
                <svg width="200" height="200" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="0.5" stroke-linecap="round" stroke-linejoin="round" class="text-white"><path d="M12 2v20M2 12h20M12 2l4 4M12 2l-4 4M12 22l4-4M12 22l-4-4"/></svg>
            </div>
            
            <h2 class="text-4xl font-bold text-white mb-12 flex items-center gap-4">
                Available Ingredients <span class="text-xs text-yellow-500 font-normal border border-yellow-500/30 px-3 py-1 rounded-full uppercase tracking-widest">Select One or More</span>
            </h2>
            
            <div id="vegGrid" class="grid grid-cols-2 md:grid-cols-5 gap-6"></div>

            <div class="mt-20 flex flex-col items-center gap-6">
                <button onclick="revealGourmetRecipes()" class="group px-16 py-7 bg-yellow-400 text-black font-black rounded-full transition-all hover:bg-white hover:scale-105 active:scale-95 shadow-[0_0_40px_rgba(250,204,21,0.2)]">
                    <span class="text-xl uppercase tracking-tighter">Open Preparation Guide</span>
                </button>
            </div>
        </section>

        <div id="recipeCore" class="space-y-32"></div>

        <footer class="mt-40 pt-20 border-t border-white/5 flex flex-col md:flex-row justify-between items-center gap-10">
            <div class="text-left">
                <h3 class="text-4xl font-black text-white italic">MALARKODI T T</h3>
                <p class="text-yellow-500 font-bold tracking-[0.2em] uppercase text-xs mt-1">Computer Science and Engineering</p>
            </div>
            <div class="text-right text-slate-500 text-xs tracking-widest uppercase">
                VSB Engineering College, Karur <br>
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
